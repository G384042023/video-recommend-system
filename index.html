<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<title>動画推薦システム（Excel連携）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

/* 视频列表 */
.video-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.video-card {
    width: 250px;
}

img {
    width: 100%;
    cursor: pointer;
}

/* ===== ⭐ 弹窗播放器（关键） ===== */

#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;

    justify-content: center;
    align-items: center;

    z-index: 1000;
}

#videoModal {
    width: 80%;
    max-width: 800px;
}

#videoModal iframe {
    width: 100%;
    height: 450px;
}

#closeBtn {
    color: white;
    font-size: 30px;
    cursor: pointer;
    position: absolute;
    top: 20px;
    right: 40px;
}
</style>
</head>

<body>

<h2 id="roundTitle">Excel読み込み中...</h2>
<p id="progress"></p>

<div class="video-container" id="videoList"></div>

<!-- ⭐ 新：弹窗播放器 -->
<div id="overlay">
    <div id="closeBtn" onclick="closeVideo()">✕</div>
    <div id="videoModal">
        <iframe id="player" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>

// ===== 全局变量 =====
let videos = [];
let remaining = [];
let selectedVideos = [];
let currentGroup = [];
let round = 1;
let hasSelected = false;

// ==========================================
// ⭐ 播放视频（改造版）
// ==========================================

function playVideo(id) {
    const overlay = document.getElementById("overlay");
    const player = document.getElementById("player");

    player.src = "https://www.youtube.com/embed/" + id;
    overlay.style.display = "flex"; // ⭐居中显示
}

// ⭐ 关闭视频
function closeVideo() {
    const overlay = document.getElementById("overlay");
    const player = document.getElementById("player");

    player.src = "";
    overlay.style.display = "none";
}

// ==========================================

function getRandomGroup() {
    let group = [];

    for (let i = 0; i < 3; i++) {
        let index = Math.floor(Math.random() * remaining.length);
        group.push(remaining[index]);
        remaining.splice(index, 1);
    }

    return group;
}

function selectVideo(index) {
    if (hasSelected) return;

    const video = currentGroup[index];

    selectedVideos.push(video);
    hasSelected = true;

    round++;
    loadRound();
}

function loadRound() {

    if (round > 3) {
        showResult();
        return;
    }

    hasSelected = false;

    document.getElementById("roundTitle").innerText =
        "第" + round + "ラウンド";

    document.getElementById("videoList").innerHTML = "";

    currentGroup = getRandomGroup();

    currentGroup.forEach((video, index) => {
        let div = document.createElement("div");
        div.className = "video-card";

        div.innerHTML = `
            <img src="https://img.youtube.com/vi/${video.id}/0.jpg"
                 onclick="playVideo('${video.id}')">
            <p>${video.title}</p>
            <button onclick="selectVideo(${index})">選択</button>
        `;

        document.getElementById("videoList").appendChild(div);
    });
}

// ==========================================
// 用户向量计算
// ==========================================

function calcUserVector(selectedVideos) {

    const weights = [0.2, 0.3, 0.5];

    let result = new Array(7).fill(0);

    for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 7; j++) {
            result[j] += selectedVideos[i].vector[j] * weights[i];
        }
    }

    let norm = Math.sqrt(result.reduce((s,v)=>s+v*v,0));

    for (let j = 0; j < 7; j++) {
        result[j] /= norm;
    }

    return result;
}

// ==========================================

function showResult() {

    const userVec = calcUserVector(selectedVideos);

    console.log("用户向量:", userVec);

    document.getElementById("roundTitle").innerText =
        "ユーザベクトル完成（F12確認）";

    document.getElementById("videoList").innerHTML = "";

    closeVideo(); // ⭐结束时确保关闭播放器
}

// ==========================================
// Excel读取
// ==========================================

async function loadExcel() {
    try {
        const response = await fetch("./data.xlsx");

        if (!response.ok) {
            throw new Error("Excel加载失败");
        }

        const data = await response.arrayBuffer();

        const workbook = XLSX.read(data, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        for (let i = 1; i <= 10; i++) {
            let row = json[i];

            if (!row || row.length < 10) continue;

            videos.push({
                id: row[2],
                title: row[1],
                vector: row.slice(3, 10).map(Number)
            });
        }

        remaining = [...videos];

        document.getElementById("roundTitle").innerText =
            "読み込み完了・開始";

        loadRound();

    } catch (e) {
        console.error(e);
        document.getElementById("roundTitle").innerText =
            "❌ Excel読み込み失敗";
    }
}

// ==========================================

loadExcel();

</script>

</body>
</html>
