<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<title>動画推薦システム（Excel連携）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

.video-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.video-card {
    width: 250px;
}

img {
    width: 100%;
    cursor: pointer;
}

/* ⭐ 改这里（防止视频变形） */
iframe {
    width: 100%;
    max-width: 560px;
    aspect-ratio: 16 / 9;
    border: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2 id="roundTitle">Excel読み込み中...</h2>
<p id="progress"></p>

<div class="video-container" id="videoList"></div>

<iframe id="player" style="display:none;"></iframe>

<script>

// ===== 全局变量 =====
let videos = [];
let remaining = [];
let selectedVideos = [];
let currentGroup = [];
let round = 1;
let hasSelected = false;

// ==========================================
// UI
// ==========================================

function playVideo(id) {
    const player = document.getElementById("player");
    player.src = "https://www.youtube.com/embed/" + id;
    player.style.display = "block";
}

function getRandomGroup() {
    let group = [];

    for (let i = 0; i < 3; i++) {
        let index = Math.floor(Math.random() * remaining.length);
        group.push(remaining[index]);
        remaining.splice(index, 1);
    }

    return group;
}

function selectVideo(index) {
    if (hasSelected) return;

    const video = currentGroup[index];
    selectedVideos.push(video);

    hasSelected = true;
    round++;

    loadRound();
}

function loadRound() {

    if (round > 3) {
        showResult();
        return;
    }

    hasSelected = false;

    document.getElementById("roundTitle").innerText =
        "第" + round + "ラウンド";

    document.getElementById("videoList").innerHTML = "";

    currentGroup = getRandomGroup();

    currentGroup.forEach((video, index) => {
        let div = document.createElement("div");
        div.className = "video-card";

        div.innerHTML = `
            <img src="https://img.youtube.com/vi/${video.id}/0.jpg"
                 onclick="playVideo('${video.id}')">
            <p>${video.title}</p>
            <button onclick="selectVideo(${index})">選択</button>
        `;

        document.getElementById("videoList").appendChild(div);
    });
}

// ==========================================
// 用户向量计算
// ==========================================

function calcUserVector(selectedVideos) {

    const weights = [0.2, 0.3, 0.5];
    let result = new Array(7).fill(0);

    for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 7; j++) {
            result[j] += selectedVideos[i].vector[j] * weights[i];
        }
    }

    let norm = Math.sqrt(result.reduce((s,v)=>s+v*v,0));

    for (let j = 0; j < 7; j++) {
        result[j] /= norm;
    }

    return result;
}

// ==========================================
// 结果
// ==========================================

function showResult() {

    const userVec = calcUserVector(selectedVideos);

    console.log("Excel读取向量:", videos);
    console.log("用户选择:", selectedVideos);

    const emotionNames = ["悲しい","不安","怒り","嫌悪","信頼","驚き","嬉しい"];

    let obj = {};
    userVec.forEach((value, index) => {
        obj[emotionNames[index]] = value;
    });

    console.table(obj);

    let norm = Math.sqrt(userVec.reduce((s,v)=>s+v*v,0));
    console.log("ノルム:", norm);

    document.getElementById("roundTitle").innerText =
        "ユーザベクトル完成（F12確認）";

    document.getElementById("videoList").innerHTML = "";

    const player = document.getElementById("player");
    player.src = "";
    player.style.display = "none";
}

// ==========================================
// Excel读取（关键修复点）
// ==========================================

async function loadExcel() {
    try {
        const response = await fetch("./data.xlsx");

        if (!response.ok) {
            throw new Error("Excel加载失败: " + response.status);
        }

        const data = await response.arrayBuffer();

        const workbook = XLSX.read(data, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        for (let i = 1; i <= 10; i++) {
            let row = json[i];

            if (!row || row.length < 10) continue;

            // ⭐⭐⭐ 核心修复：手动指定顺序
            videos.push({
                id: row[2],
                title: row[1],
                vector: [
                    Number(row[3]), // 悲しい
                    Number(row[4]), // 不安
                    Number(row[5]), // 怒り
                    Number(row[6]), // 嫌悪
                    Number(row[7]), // 信頼
                    Number(row[8]), // 驚き
                    Number(row[9])  // 嬉しい
                ]
            });
        }

        console.log("读取完成:", videos);

        remaining = [...videos];

        document.getElementById("roundTitle").innerText =
            "読み込み完了・開始";

        loadRound();

    } catch (e) {
        console.error("❌错误:", e);
        document.getElementById("roundTitle").innerText =
            "❌ Excel読み込み失敗（F12見て）";
    }
}

// 启动
loadExcel();

</script>

</body>
</html>
