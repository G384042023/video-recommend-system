<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>動画推薦システム</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

.video-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.video-card {
    width: 250px;
}

img {
    width: 100%;
    cursor: pointer;
}

button {
    margin-top: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

button:disabled {
    background-color: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<h2 id="roundTitle"></h2>
<p id="progress"></p>

<div class="video-container" id="videoList"></div>

<!-- 播放器 -->
<div style="margin-top:30px;">
    <iframe id="player"
        width="560"
        height="315"
        src=""
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

<script>

// ====== 视频数据 ======
const videos = [
    {id:"4CSOwxhGvmY", title:"Video A"},
    {id:"W85F-UmnbF4", title:"Video B"},
    {id:"xfY6BTVhzV0", title:"Video C"},
    {id:"QOsuzYhiExY", title:"Video D"},
    {id:"USUa0A3IJNA", title:"Video E"},
    {id:"fv_HObWMFKU", title:"Video F"},
    {id:"j9V78UbdzWI", title:"Video G"},
    {id:"dQw4w9WgXcQ", title:"Video H"},
    {id:"9AjkUyX0rVw", title:"Video I"},
    {id:"l0GN40EL1VU", title:"Video J"},
];

// ======================

let round = 1;
let selectedVideos = [];
let remaining = [...videos];   // 剩余视频池
let hasSelected = false;

// ====== 动态分组核心 ======
function getRandomGroup() {
    let group = [];

    for (let i = 0; i < 3; i++) {
        if (remaining.length === 0) break;

        let index = Math.floor(Math.random() * remaining.length);
        group.push(remaining[index]);

        // 从池中删除，保证不重复
        remaining.splice(index, 1);
    }

    return group;
}
// =========================

function loadRound() {

    if (round > 3) {
        showResult();
        return;
    }

    hasSelected = false;

    document.getElementById("roundTitle").innerText =
        "第" + round + "ラウンド：最も興味のある動画を選択してください";

    document.getElementById("progress").innerText =
        "進行状況：" + round + " / 3";

    const container = document.getElementById("videoList");
    container.innerHTML = "";

    let currentVideos = getRandomGroup();   // ⭐动态抽取

    currentVideos.forEach(video => {

        let div = document.createElement("div");
        div.className = "video-card";

        div.innerHTML = `
            <img src="https://img.youtube.com/vi/${video.id}/0.jpg"
                 onclick="playVideo('${video.id}')">
            <p onclick="playVideo('${video.id}')">${video.title}</p>
            <button onclick="selectVideo('${video.id}')">選択</button>
        `;

        container.appendChild(div);
    });
}

function playVideo(id) {
    document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id;
}

function selectVideo(id) {

    if (hasSelected) return;

    hasSelected = true;

    let video = videos.find(v => v.id === id);
    selectedVideos.push(video);

    document.querySelectorAll("button").forEach(btn => btn.disabled = true);

    setTimeout(() => {
        round++;
        loadRound();
    }, 500);
}

function showResult() {
    document.body.innerHTML = `
        <h2>選択完了！</h2>
        <p>あなたが選んだ動画：</p>
        <ul>
            ${selectedVideos.map(v => `<li>${v.title}</li>`).join("")}
        </ul>
    `;
}

// 初始化
loadRound();

</script>

</body>
</html>
