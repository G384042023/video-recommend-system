<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>動画推薦システム</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    padding: 20px;
}

/* ⭐关键：允许换行 */
.video-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
}

/* 防止被压缩 */
.video-card {
    width: 250px;
    flex-shrink: 0;
}

img {
    width: 100%;
    cursor: pointer;
}

/* ⭐播放器自适应 */
iframe {
    width: 100%;
    max-width: 560px;
    height: 315px;
    margin-top: 30px;
}

button {
    margin-top: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

button:disabled {
    background-color: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<p id="progress"></p>

<div class="video-container" id="videoList"></div>
